# Compose Specification file. Works with `podman compose` (the Compose plugin)
# and with `podman-compose`.
#
# There is deliberately no `build:` section: images are built beforehand by
# scripts/container-build.sh with `podman build`. This keeps the stack
# vendor-neutral and keeps any proprietary build-file naming out of this file.
#
# Launch this stack rootful (`sudo podman compose up -d`, or use
# scripts/run.sh): BlueZ's D-Bus policy only accepts calls from uid 0, and the
# images must be built rootful so this rootful stack can find them. See
# docs/adr/0005, docs/adr/0010, and docs/bluetooth.md.

services:
  collector:
    image: localhost/myinkbird-collector:latest
    # Never try to pull from a registry: this image is built locally, rootful,
    # by scripts/container-build.sh. Without this, a rootful `compose up` that
    # cannot find the image tries to pull `localhost/...` and fails with a
    # "connection refused" error. See docs/adr/0010.
    pull_policy: never
    # Fedora/SELinux: allow the bind-mounted host paths (the D-Bus socket and
    # the data directory) to be used by the container. See docs/bluetooth.md.
    security_opt:
      - label=disable
    volumes:
      # Talk to the host bluetoothd over the system D-Bus socket (listen-only;
      # we never open a GATT connection - see docs/adr/0003).
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
      # Store readings on the HOST so they are visible and git-committable,
      # rather than hidden inside an opaque named volume. Defaults to ./data
      # next to this file; override with INKBIRD_HOST_DATA_DIR. See docs/adr/0006.
      - ${INKBIRD_HOST_DATA_DIR:-./data}:/data
    environment:
      RUST_LOG: ${RUST_LOG:-info}
      INKBIRD_DATA_DIR: /data
      # Set INKBIRD_ADDRESS to your sensor's Bluetooth address for reliable
      # matching (find it with `discover`). Empty = match by name instead.
      INKBIRD_ADDRESS: ${INKBIRD_ADDRESS:-}
      INKBIRD_NAME_MATCH: ${INKBIRD_NAME_MATCH:-ith-13-b}
      INKBIRD_MIN_INTERVAL_SECS: ${INKBIRD_MIN_INTERVAL_SECS:-60}
    restart: unless-stopped

  committer:
    image: localhost/myinkbird-committer:latest
    pull_policy: never
    # Same SELinux relaxation so the sidecar can read/commit the bind-mounted
    # host data directory.
    security_opt:
      - label=disable
    volumes:
      - ${INKBIRD_HOST_DATA_DIR:-./data}:/data
    environment:
      INKBIRD_DATA_DIR: /data
      GIT_AUTHOR_NAME: ${GIT_AUTHOR_NAME:-myinkbird}
      GIT_AUTHOR_EMAIL: ${GIT_AUTHOR_EMAIL:-myinkbird@localhost}
      COMMIT_INTERVAL_SECS: ${COMMIT_INTERVAL_SECS:-300}
    depends_on:
      - collector
    restart: unless-stopped

# No named volume any more: the data lives on the host at INKBIRD_HOST_DATA_DIR
# (default ./data), which is where you can see the NDJSON files and their local
# git history.
