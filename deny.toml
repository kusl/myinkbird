# cargo-deny configuration. Run via scripts/deny.sh (or `cargo deny check`).
#
# Policy (see docs/adr/0007): only free licences that permit commercial use and
# are compatible with distributing this project under AGPL-3.0-or-later. Any
# licence not on the allow-list below fails the check, so a new dependency with
# an unexpected licence is caught in CI.

[advisories]
version = 2
# Fail on any crate with a known security advisory or that has been yanked.
yanked = "deny"
ignore = []

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    # This project's own crates.
    "AGPL-3.0-or-later",
    "AGPL-3.0",
    # Permissive, commercial-friendly, AGPL-compatible licences.
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "0BSD",
    "MPL-2.0",
    "CC0-1.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
]

[bans]
# Duplicate versions are a warning, not a hard failure, for a small project.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
